load:
  defaults:
    epsg: 4326
    geom_index: false
    geom_column: geom

  table_1:
    duckdb: ~/path/to/some.db

  table_2:
    duckdb: ~/path/to/some.db
    table: not_table_2
    index: true

  table_3:
    file: ~/path/to/file.shp
    epsg: 2193

  table_4:
    wfs: https://wfs.example.com

  table_5:
    esri: https://services3.arcgis.com/example/dummy/rest/services/test/FeatureServer/0

  table_raster_512:
    raster: local.tiff
    tile_size: 512
