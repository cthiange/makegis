- load:
    table_one:
      duckdb: ./path/to/some.db

- name: group_a
  load:
    table_1:
      duckdb: ./path/to/some.db

    table_2:
      duckdb: ./path/to/some.db
      table: not_table_2
      geom_index: true


- name: group_b
  defaults:
    # Also applies to load blocks inside custom nodes
    load:
      geom_index: true

  load:
    table_3:
      file: path/to/file.shp
      epsg: 2193

    table_4:
      wfs: https://wfs.example.com

  transform:
    - cleanup_table_4.sql
    - aggregate_table_3.sql

  custom:
    - deps:
        - table: raw.upstream_table
      prep:
        - do_this_first.py
        - then_this.py
      load:
        table_1:
          duckdb: ~/path/to/some.db
          epsg: 4326
          geom_index: false
          geom_column: geom

    - name: node_x
      run:
        - cmd: script_1.py
          creates:
            - table: table_created_by_script_1
            - table: other_table_created_by_script_1
        - cmd: script_2.py
          creates:
            - table: another_table


- name: group_c
  load:
    table_5:
      esri: https://services3.arcgis.com/example/dummy/rest/services/test/FeatureServer/0

    table_raster_512:
      raster: local.tiff
      tile_size: 512


